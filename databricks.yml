# Databricks Asset Bundle for the TodayBank GRC Operations Hub demo.
#
# Deploy:    databricks bundle deploy --target dev
# Run setup: databricks bundle run setup_job --target dev

bundle:
  name: todaybank-grc-demo

variables:
  catalog:
    description: "Unity Catalog to deploy the demo into"
    default: "todaybank_grc_demo"
  warehouse_id:
    description: "Serverless SQL warehouse ID for SQL tasks"
    default: ""

resources:
  sql_warehouses:
    demo_warehouse:
      name: "TodayBank GRC Demo Warehouse"
      warehouse_type: PRO
      enable_serverless_compute: true
      cluster_size: "Small"
      auto_stop_mins: 30
      min_num_clusters: 1
      max_num_clusters: 1

  jobs:
    setup_job:
      name: "TodayBank GRC Demo – Setup & Generate Data"
      job_clusters:
        - job_cluster_key: todaybank_grc_demo_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
      tasks:
        - task_key: setup_data
          job_cluster_key: todaybank_grc_demo_cluster
          notebook_task:
            notebook_path: ./notebooks/00_setup_and_generate_data.py
            base_parameters:
              catalog: ${var.catalog}

    pipeline_kickoff:
      name: "TodayBank GRC Demo – Run Pipeline + AI + ML"
      job_clusters:
        - job_cluster_key: todaybank_grc_demo_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 2
      tasks:
        - task_key: run_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.grc_pipeline.id}
        - task_key: ai_functions
          depends_on:
            - task_key: run_pipeline
          job_cluster_key: todaybank_grc_demo_cluster
          notebook_task:
            notebook_path: ./notebooks/02_ai_classify_and_extract.py
            base_parameters:
              catalog: ${var.catalog}
        - task_key: aml_model
          depends_on:
            - task_key: ai_functions
          job_cluster_key: todaybank_grc_demo_cluster
          notebook_task:
            notebook_path: ./notebooks/03_aml_model_mlflow.py
            base_parameters:
              catalog: ${var.catalog}
        - task_key: governance
          depends_on:
            - task_key: aml_model
          job_cluster_key: todaybank_grc_demo_cluster
          notebook_task:
            notebook_path: ./notebooks/04_governance_walkthrough.py
            base_parameters:
              catalog: ${var.catalog}

  pipelines:
    grc_pipeline:
      name: "todaybank-grc-demo-pipeline"
      target: ${var.catalog}
      catalog: ${var.catalog}
      libraries:
        - notebook:
            path: ./notebooks/01_lakeflow_pipeline.py
      configuration:
        CATALOG: ${var.catalog}
      serverless: true
      photon: true

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: e2-demo-west

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
